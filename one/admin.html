<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin &mdash; RSVP Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#b8922a;--gold-light:#d4a843;--gold-pale:#f5edd8;
      --cream:#faf8f4;--white:#fff;--text:#2c2416;
      --text-mid:#6b5a3e;--text-light:#a89370;
      --border:#e8dfc8;--bg-input:#fdfaf5;
      --green:#1e6b35;--green-bg:#edf7f1;
      --red:#c0392b;--red-bg:#fdf3f2;
      --blue:#1a5fa8;--blue-bg:#edf3fc;
      --serif:'Cormorant Garamond',Georgia,serif;
      --sans:'Inter',system-ui,sans-serif;
      --r:8px;--sh-sm:0 1px 4px rgba(0,0,0,.06);--sh:0 4px 20px rgba(0,0,0,.08);
    }
    body{font-family:var(--sans);background:var(--cream);color:var(--text);min-height:100vh;font-size:14px}

    /* NAV */
    .topnav{
      position:sticky;top:0;z-index:100;
      background:var(--white);border-bottom:1px solid var(--border);
      height:56px;padding:0 1.5rem;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:var(--sh-sm);
    }
    .nav-brand{font-family:var(--serif);font-size:1.3rem;font-weight:500;color:var(--text)}
    .nav-brand span{color:var(--gold)}
    .nav-right{display:flex;align-items:center;gap:1rem}
    .nav-tag{font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;background:var(--gold-pale);color:var(--gold);padding:.25rem .6rem;border-radius:20px;border:1px solid rgba(184,146,42,.25)}
    .nav-logout{font-size:.75rem;color:var(--text-light);text-decoration:none;font-weight:500;transition:color .18s}
    .nav-logout:hover{color:var(--red)}

    /* LAYOUT */
    .wrap{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
    @media(max-width:480px){.wrap{padding:1.2rem .75rem}}

    /* STATS ROW */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
    @media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:360px){.stats{grid-template-columns:1fr}}
    .stat-card{
      background:var(--white);border:1px solid var(--border);
      border-radius:var(--r);padding:1.1rem 1.2rem;
      box-shadow:var(--sh-sm);
    }
    .stat-label{font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-light);margin-bottom:.4rem}
    .stat-val{font-family:var(--serif);font-size:2rem;font-weight:600;color:var(--text);line-height:1}
    .stat-sub{font-size:.7rem;color:var(--text-light);margin-top:.3rem}
    .stat-card.gold .stat-val{color:var(--gold)}
    .stat-card.green .stat-val{color:var(--green)}
    .stat-card.blue .stat-val{color:var(--blue)}

    /* TABLE CARD */
    .table-card{
      background:var(--white);border:1px solid var(--border);
      border-radius:12px;box-shadow:var(--sh);overflow:hidden;
    }
    .table-head{
      padding:1.1rem 1.5rem;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:1rem;
      flex-wrap:wrap;
    }
    .table-title{font-family:var(--serif);font-size:1.25rem;font-weight:500;color:var(--text)}
    .table-actions{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
    .search-box{
      display:flex;align-items:center;gap:.4rem;
      border:1.5px solid var(--border);border-radius:var(--r);
      padding:.42rem .7rem;background:var(--bg-input);
      transition:border-color .18s;
    }
    .search-box:focus-within{border-color:var(--gold)}
    .search-box svg{width:13px;height:13px;stroke:var(--text-light);stroke-width:2;fill:none;stroke-linecap:round}
    .search-box input{
      border:none;background:none;outline:none;
      font-family:var(--sans);font-size:.8rem;color:var(--text);width:160px;
    }
    .search-box input::placeholder{color:#c5b898}
    .btn-export{
      display:flex;align-items:center;gap:.35rem;
      padding:.42rem .85rem;border:1.5px solid var(--border);
      background:var(--white);color:var(--text-mid);
      font-family:var(--sans);font-size:.73rem;font-weight:500;
      border-radius:var(--r);cursor:pointer;transition:all .18s;
      text-decoration:none;
    }
    .btn-export:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-pale)}
    .btn-export svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round}

    /* TABLE */
    .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;min-width:680px}
    thead tr{background:#fdfaf6;border-bottom:1px solid var(--border)}
    th{
      padding:.65rem 1rem;text-align:left;
      font-size:.6rem;font-weight:600;letter-spacing:.12em;
      text-transform:uppercase;color:var(--text-light);
      white-space:nowrap;
    }
    tbody tr{
      border-bottom:1px solid rgba(0,0,0,.035);
      transition:background .12s;cursor:pointer;
    }
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:#fdfaf0}
    td{padding:.7rem 1rem;font-size:.82rem;color:var(--text);vertical-align:middle}
    .td-name{font-weight:500}
    .td-email{color:var(--text-mid);font-size:.76rem}
    .td-from{color:var(--text-mid)}
    .badge{
      display:inline-flex;align-items:center;gap:.28rem;
      font-size:.65rem;font-weight:600;padding:.22rem .55rem;
      border-radius:20px;white-space:nowrap;
    }
    .badge.confirmed{background:var(--green-bg);color:var(--green)}
    .badge.pending{background:#fff8ec;color:#b07020;border:1px solid #f0d080}
    .badge.alone{background:var(--blue-bg);color:var(--blue)}
    .badge.group{background:var(--gold-pale);color:var(--gold)}
    .badge svg{width:9px;height:9px;stroke:currentColor;stroke-width:2.5;fill:none;stroke-linecap:round}
    .btn-view{
      font-size:.7rem;font-weight:500;color:var(--gold);
      background:none;border:1px solid rgba(184,146,42,.3);
      padding:.2rem .55rem;border-radius:4px;
      cursor:pointer;transition:all .15s;white-space:nowrap;
    }
    .btn-view:hover{background:var(--gold-pale)}

    /* EMPTY */
    .empty-row td{text-align:center;padding:2rem;color:var(--text-light);font-size:.82rem}

    /* FOOTER COUNT */
    .table-foot{
      padding:.75rem 1.5rem;border-top:1px solid var(--border);
      background:#fdfaf6;font-size:.72rem;color:var(--text-light);
      display:flex;justify-content:space-between;align-items:center;
    }

    /* MODAL */
    .overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.35);
      z-index:500;display:none;align-items:center;justify-content:center;
      padding:1rem;
    }
    .overlay.show{display:flex}
    .modal{
      background:var(--white);border-radius:12px;
      box-shadow:0 16px 60px rgba(0,0,0,.18);
      width:100%;max-width:480px;max-height:90vh;
      overflow-y:auto;position:relative;
    }
    .modal-head{
      padding:1.2rem 1.5rem;
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .modal-title{font-family:var(--serif);font-size:1.2rem;font-weight:500;color:var(--text)}
    .modal-close{
      width:28px;height:28px;border-radius:50%;
      background:#f5f0e8;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .15s;
    }
    .modal-close:hover{background:#ede5d8}
    .modal-close svg{width:12px;height:12px;stroke:var(--text-mid);stroke-width:2.5;fill:none;stroke-linecap:round}
    .modal-body{padding:1.2rem 1.5rem}
    .m-section{margin-bottom:1.1rem}
    .m-sec-title{font-size:.6rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
    .m-row{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid rgba(0,0,0,.04);font-size:.82rem}
    .m-row:last-child{border-bottom:none}
    .mk{color:var(--text-light);font-size:.76rem}
    .mv{font-weight:500;color:var(--text);text-align:right;word-break:break-word;max-width:60%}
  </style>
</head>
<body>

<nav class="topnav">
  <div class="nav-brand">Wedding <span>Admin</span></div>
  <div class="nav-right">
    <span class="nav-tag">Admin</span>
    <a href="index1.html" class="nav-logout">← Exit</a>
  </div>
</nav>

<div class="wrap">

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card gold">
      <div class="stat-label">Total RSVPs</div>
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-sub">Responses received</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Total Guests</div>
      <div class="stat-val" id="stat-guests">0</div>
      <div class="stat-sub">Including co-passengers</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Countries</div>
      <div class="stat-val" id="stat-countries">0</div>
      <div class="stat-sub">Travelling from</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">With Guests</div>
      <div class="stat-val" id="stat-withguests">0</div>
      <div class="stat-sub">Brought co-passengers</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-card">
    <div class="table-head">
      <div class="table-title">All RSVPs</div>
      <div class="table-actions">
        <div class="search-box">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search name or city..." id="search-inp" oninput="renderTable()">
        </div>
        <button class="btn-export" onclick="exportCSV()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export CSV
        </button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>From</th>
            <th>Arriving At</th>
            <th>Guests</th>
            <th>Submitted</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
    <div class="table-foot">
      <span id="foot-count">Showing 0 of 0</span>
      <span>RSVP Deadline: 15 Aug 2025</span>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <span class="modal-title" id="modal-title">Guest Details</span>
      <button class="modal-close" onclick="closeModalDirect()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const DUMMY = [
  {
    name:'Arjun Mehta',age:'32',email:'arjun.mehta@gmail.com',
    from_country:'India',from_city:'Mumbai',to_city:'Jaipur',
    fly_date:'2025-11-23',land_date:'2025-11-24',
    food:'Vegetarian',adults:[{name:'Priya Mehta',age:'29',food:'None'}],kids:[],
    notes:'Looking forward to the celebration!',submitted_at:'2025-08-02T10:14:00Z'
  },
  {
    name:'Riya Sharma',age:'27',email:'riya.sharma@gmail.com',
    from_country:'United Kingdom',from_city:'London',to_city:'Delhi',
    fly_date:'2025-11-22',land_date:'2025-11-23',
    food:'Gluten-free',adults:[],kids:[],
    notes:'',submitted_at:'2025-08-05T08:30:00Z'
  },
  {
    name:'Kabir Agarwal',age:'45',email:'kabir.ag@outlook.com',
    from_country:'UAE',from_city:'Dubai',to_city:'Delhi',
    fly_date:'2025-11-21',land_date:'2025-11-22',
    food:'None',adults:[{name:'Neha Agarwal',age:'42',food:'Vegetarian'},{name:'Rohan Agarwal',age:'18',food:'None'}],kids:[{name:'Tia Agarwal',age:'8',food:'No nuts'}],
    notes:'Neha is allergic to peanuts. Please confirm hotel arrangements.',submitted_at:'2025-08-06T14:22:00Z'
  },
  {
    name:'Simran Kaur',age:'29',email:'simran.kaur@yahoo.com',
    from_country:'Canada',from_city:'Toronto',to_city:'Delhi',
    fly_date:'2025-11-20',land_date:'2025-11-21',
    food:'Vegan',adults:[],kids:[],
    notes:'Will need a vegan meal option at the reception.',submitted_at:'2025-08-08T11:05:00Z'
  },
  {
    name:'Vikram Nair',age:'38',email:'vikram.nair@hotmail.com',
    from_country:'Singapore',from_city:'Singapore',to_city:'Bangalore',
    fly_date:'2025-11-23',land_date:'2025-11-23',
    food:'Non-vegetarian',adults:[{name:'Anjali Nair',age:'35',food:'None'}],kids:[{name:'Sam Nair',age:'5',food:'None'}],
    notes:'',submitted_at:'2025-08-09T09:45:00Z'
  },
  {
    name:'Priya Joshi',age:'24',email:'priya.joshi@gmail.com',
    from_country:'India',from_city:'Bengaluru',to_city:'Jaipur',
    fly_date:'2025-11-24',land_date:'2025-11-24',
    food:'None',adults:[],kids:[],
    notes:'Old college friend! So excited.',submitted_at:'2025-08-10T16:00:00Z'
  },
  {
    name:'Omar Al-Farsi',age:'41',email:'omar.alfarsi@gmail.com',
    from_country:'Qatar',from_city:'Doha',to_city:'Mumbai',
    fly_date:'2025-11-22',land_date:'2025-11-22',
    food:'Halal only',adults:[{name:'Fatima Al-Farsi',age:'38',food:'Halal only'}],kids:[{name:'Yousef',age:'10',food:'Halal only'},{name:'Layla',age:'7',food:'Halal only'}],
    notes:'Please ensure halal food options for all meals.',submitted_at:'2025-08-11T07:20:00Z'
  },
  {
    name:'Ananya Pillai',age:'31',email:'ananya.pillai@gmail.com',
    from_country:'Australia',from_city:'Sydney',to_city:'Chennai',
    fly_date:'2025-11-21',land_date:'2025-11-22',
    food:'Vegetarian, no onion/garlic',adults:[],kids:[],
    notes:'',submitted_at:'2025-08-12T13:10:00Z'
  }
];

let data = [];

function loadData(){
  const saved = JSON.parse(localStorage.getItem('rsvp_submissions')||'[]');
  data = saved.length ? saved : DUMMY;
  calcStats();
  renderTable();
}

function calcStats(){
  document.getElementById('stat-total').textContent = data.length;
  const totalG = data.reduce((s,r)=>s+1+(r.adults||[]).length+(r.kids||[]).length, 0);
  document.getElementById('stat-guests').textContent = totalG;
  const countries = new Set(data.map(r=>r.from_country).filter(Boolean));
  document.getElementById('stat-countries').textContent = countries.size;
  const withG = data.filter(r=>(r.adults||[]).length+(r.kids||[]).length>0).length;
  document.getElementById('stat-withguests').textContent = withG;
}

function renderTable(){
  const q = document.getElementById('search-inp').value.trim().toLowerCase();
  const filtered = q ? data.filter(r=>
    r.name.toLowerCase().includes(q)||
    (r.from_city||'').toLowerCase().includes(q)||
    (r.to_city||'').toLowerCase().includes(q)||
    (r.from_country||'').toLowerCase().includes(q)
  ) : data;

  const tbody = document.getElementById('tbl-body');
  if(!filtered.length){
    tbody.innerHTML='<tr class="empty-row"><td colspan="7">No results found.</td></tr>';
    document.getElementById('foot-count').textContent='Showing 0 of '+data.length;
    return;
  }

  tbody.innerHTML = filtered.map((r,i)=>{
    const extras = (r.adults||[]).length+(r.kids||[]).length;
    const gBadge = extras>0
      ? `<span class="badge group"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>+${extras}</span>`
      : `<span class="badge alone"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Solo</span>`;
    const date = r.submitted_at ? new Date(r.submitted_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    return `<tr onclick="openModal(${data.indexOf(r)})">
      <td style="color:var(--text-light);font-size:.74rem">${i+1}</td>
      <td><div class="td-name">${r.name}</div><div class="td-email">${r.email}</div></td>
      <td class="td-from">${r.from_country||'—'}<br><span style="font-size:.72rem;color:var(--text-light)">${r.from_city||''}</span></td>
      <td>${r.to_city||'—'}</td>
      <td>${gBadge}</td>
      <td style="color:var(--text-light);font-size:.76rem">${date}</td>
      <td><button class="btn-view" onclick="event.stopPropagation();openModal(${data.indexOf(r)})">View</button></td>
    </tr>`;
  }).join('');

  document.getElementById('foot-count').textContent=`Showing ${filtered.length} of ${data.length}`;
}

function openModal(idx){
  const r = data[idx];
  document.getElementById('modal-title').textContent = r.name;
  const row=(k,v)=>`<div class="m-row"><span class="mk">${k}</span><span class="mv">${v||'—'}</span></div>`;
  let h = '';
  h += `<div class="m-section"><div class="m-sec-title">Personal</div>${row('Name',r.name)}${row('Age',r.age)}${row('Email',r.email)}</div>`;
  h += `<div class="m-section"><div class="m-sec-title">Travel</div>${row('From Country',r.from_country)}${row('Departure City',r.from_city)}${row('Arrival City',r.to_city)}${row('Departs',r.fly_date)}${row('Arrives',r.land_date)}</div>`;
  h += `<div class="m-section"><div class="m-sec-title">Food</div>${row('Preferences',r.food||'None')}</div>`;
  if((r.adults||[]).length){
    h += `<div class="m-section"><div class="m-sec-title">Adults</div>${r.adults.map((a,i)=>row('Adult '+(i+1),a.name+' ('+a.age+')')).join('')}</div>`;
  }
  if((r.kids||[]).length){
    h += `<div class="m-section"><div class="m-sec-title">Kids</div>${r.kids.map((k,i)=>row('Kid '+(i+1),k.name+' ('+k.age+')')).join('')}</div>`;
  }
  if(r.notes){
    h += `<div class="m-section"><div class="m-sec-title">Notes</div><p style="font-size:.82rem;color:var(--text-mid);line-height:1.7">${r.notes}</p></div>`;
  }
  document.getElementById('modal-body').innerHTML = h;
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(e){if(e.target===document.getElementById('overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('overlay').classList.remove('show');document.body.style.overflow='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});

function exportCSV(){
  const headers=['Name','Age','Email','Country','From City','Arrival City','Depart Date','Arrive Date','Food','Adults','Kids','Notes','Submitted'];
  const rows = data.map(r=>[
    r.name,r.age,r.email,r.from_country,r.from_city,r.to_city,
    r.fly_date,r.land_date,r.food,
    (r.adults||[]).map(a=>a.name+'('+a.age+')').join('; '),
    (r.kids||[]).map(k=>k.name+'('+k.age+')').join('; '),
    (r.notes||'').replace(/,/g,' '),
    r.submitted_at
  ]);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='rsvp_list.csv';
  a.click();
}

loadData();
</script>
</body>
</html>
